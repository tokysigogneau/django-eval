<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href=".././static/ezservice/style.css">
    <title>My amazing blog</title>
</head>

<body>
    <div id="header">
        <h1>logo</h1>
        <ul >
            <ul><a href="{% url 'ezservice:index'%}">Home</a></ul>
            <ul><a href="{% url 'ezservice:my_skills' %}">Mes compétences</a></ul>
            <ul><a href="{% url 'ezservice:add_skill' %}">Ajouter une compétence</a></ul>

        </ul>
        <div class="d-flex">
            {% if user.is_authenticated %}
                <span>
                    Bonjour {{ user.username }}
                </span>
                <form method="post" action="{% url 'ezservice:logout' %}">
                    {% csrf_token %}
                    <button type="submit" >
                        Déconnexion
                    </button>
                </form>

            {% else %}
                <a href="{% url 'ezservice:login' %}">
                    Connexion
                </a>
            {% endif %}
        </div>
    </div>

    <div id="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
