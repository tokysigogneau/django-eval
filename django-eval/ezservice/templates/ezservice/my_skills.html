{% extends "base.html" %}
{% load static %}
{% block header %}

{% endblock %}

{% block content %}
<h2>Mes compétences</h2>

<ul>
    {% for user in my_skills_list %}
        <li><a href="{% url 'ezservice:service_owner' user.skill.skill_name %}">
            {{ user.skill.skill_name }}</a>
        </li>
    {% empty %}
        <li>Aucune compétence enregistrée.</li>
    {% endfor %}
</ul>

<a href="{% url 'ezservice:add_skill' %}">Ajouter une compétence</a>

{% endblock %}
